# GitHub Actions — Release iOS (TestFlight)
#
# Required repository secrets:
#   BUILD_CERTIFICATE_BASE64           — base64 of Apple Distribution .p12 (same team as profile)
#   P12_PASSWORD                       — password for the .p12 file
#   KEYCHAIN_PASSWORD                  — any strong random string (CI-only keychain)
#   APPSTORE_PROVISIONING_PROFILE_BASE64 — base64 of App Store .mobileprovision
#   APPSTORE_ISSUER_ID                 — App Store Connect API Issuer ID (TestFlight upload)
#   APPSTORE_API_KEY_ID                — App Store Connect API Key ID
#   APPSTORE_API_PRIVATE_KEY           — full contents of AuthKey_XXXX.p8 (App Manager role)
#
# API key must belong to the SAME team as the app (SQV87MQH24 / com.mytrekguide.app).
# Create the app in App Store Connect before the first upload.
# Encode profile: base64 -i YourProfile.mobileprovision | pbcopy
#
# Triggers: every push to main/master, or manually from Actions tab.

name: Release iOS (TestFlight)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number override (leave blank to use pubspec)"
        required: false
        type: string

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

env:
  IOS_BUNDLE_ID: com.mytrekguide.app

jobs:
  release-testflight:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.7"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Set up keychain and import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "BUILD_CERTIFICATE_BASE64 secret is required."
            exit 1
          fi
          if [ -z "$P12_PASSWORD" ]; then
            echo "P12_PASSWORD secret is required."
            exit 1
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "KEYCHAIN_PASSWORD secret is required."
            exit 1
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profile
        id: mobile_profile
        env:
          APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$APPSTORE_PROVISIONING_PROFILE_BASE64" ]; then
            echo "APPSTORE_PROVISIONING_PROFILE_BASE64 secret is required."
            exit 1
          fi

          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          PP_PLIST=$RUNNER_TEMP/profile.plist
          echo -n "$APPSTORE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security cms -D -i "$PP_PATH" > "$PP_PLIST"

          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PP_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PP_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$PP_PLIST")
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$PP_PLIST")
          BUNDLE_ID=${APP_ID#*.}

          echo "Installed profile: $PROFILE_NAME"
          echo "Team ID: $TEAM_ID"
          echo "Bundle ID in profile: $BUNDLE_ID"
          echo "Expected bundle ID: $IOS_BUNDLE_ID"

          if [ "$BUNDLE_ID" != "$IOS_BUNDLE_ID" ]; then
            echo "::error::Provisioning profile is for '$BUNDLE_ID' but My Trek Guide uses '$IOS_BUNDLE_ID'. Download/create the correct App Store profile in Apple Developer."
            exit 1
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "team_id=$TEAM_ID" >> "$GITHUB_OUTPUT"

          cat > ios/ExportOptions.generated.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Configure manual code signing for CI
        env:
          PROFILE_NAME: ${{ steps.mobile_profile.outputs.profile_name }}
          PROFILE_UUID: ${{ steps.mobile_profile.outputs.profile_uuid }}
          TEAM_ID: ${{ steps.mobile_profile.outputs.team_id }}
        run: |
          PBX=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' \
            "$PBX"
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_NAME}\";/g" "$PBX"
          sed -i '' "s/DEVELOPMENT_TEAM = SQV87MQH24;/DEVELOPMENT_TEAM = ${TEAM_ID};/g" "$PBX"
          echo "Code signing identities available to Xcode:"
          security find-identity -v -p codesigning

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build release IPA
        run: |
          EXTRA=""
          if [ -n "${{ inputs.build_number }}" ]; then
            EXTRA="--build-number=${{ inputs.build_number }}"
          fi
          flutter build ipa --release $EXTRA \
            --export-options-plist=ios/ExportOptions.generated.plist \
            --dart-define=IS_LIVE=true

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(find build/ios/ipa -name '*.ipa' -print -quit)
          if [ -z "$IPA" ]; then
            echo "IPA not found under build/ios/ipa"
            ls -laR build/ios || true
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Built: $IPA"

      - name: Verify IPA bundle and signature
        run: |
          IPA="${{ steps.ipa.outputs.path }}"
          TMP=$(mktemp -d)
          unzip -q "$IPA" -d "$TMP"
          APP=$(find "$TMP/Payload" -maxdepth 1 -name '*.app' -print -quit)
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$APP/Info.plist")
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$APP/Info.plist")
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$APP/Info.plist")
          echo "IPA bundle ID: $BUNDLE_ID"
          echo "IPA version: $VERSION ($BUILD_NUMBER)"
          if [ "$BUNDLE_ID" != "$IOS_BUNDLE_ID" ]; then
            echo "::error::IPA bundle ID is '$BUNDLE_ID' but expected '$IOS_BUNDLE_ID'."
            exit 1
          fi
          codesign -dvvv "$APP" 2>&1 | grep -E 'Authority=|TeamIdentifier=|Identifier=' || true

      - name: Validate App Store Connect API key
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          if [ -z "$APPSTORE_ISSUER_ID" ] || [ -z "$APPSTORE_API_KEY_ID" ] || [ -z "$APPSTORE_API_PRIVATE_KEY" ]; then
            echo "::error::APPSTORE_ISSUER_ID, APPSTORE_API_KEY_ID, and APPSTORE_API_PRIVATE_KEY are required."
            exit 1
          fi
          python3 -m venv "$RUNNER_TEMP/asc-venv"
          source "$RUNNER_TEMP/asc-venv/bin/activate"
          pip install --quiet pyjwt cryptography
          python <<'PY'
          import json, os, time, urllib.error, urllib.request
          import jwt

          key_id = os.environ["APPSTORE_API_KEY_ID"].strip()
          issuer_id = os.environ["APPSTORE_ISSUER_ID"].strip()
          private_key = os.environ["APPSTORE_API_PRIVATE_KEY"]
          bundle_id = os.environ["IOS_BUNDLE_ID"]

          token = jwt.encode(
              {
                  "iss": issuer_id,
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 1200,
                  "aud": "appstoreconnect-v1",
              },
              private_key,
              algorithm="ES256",
              headers={"kid": key_id, "typ": "JWT"},
          )

          url = f"https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]={bundle_id}"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode()
              print(f"::error::App Store Connect API rejected credentials ({exc.code}).")
              print(body)
              if exc.code == 401:
                  print("Fix: use an API key from the team that owns com.mytrekguide.app (SQV87MQH24), with App Manager role.")
              raise SystemExit(1) from exc

          apps = data.get("data", [])
          if not apps:
              print(f"::error::No app found in App Store Connect for bundle ID {bundle_id}.")
              print("Fix: App Store Connect → Apps → + → New App → bundle ID com.mytrekguide.app")
              raise SystemExit(1)

          attrs = apps[0]["attributes"]
          print(f"App Store Connect app OK: {attrs.get('name')} (id={apps[0]['id']}, sku={attrs.get('sku')})")
          PY

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          backend: appstore-api
          uses-non-exempt-encryption: "false"
          wait-for-processing: "false"

      - name: Upload IPA artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30
